<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGradient)"/>

  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- AI Brain Icon -->
  <g transform="translate(100, 85)">
    <!-- Brain Outline -->
    <path d="M-35,-20 
             C-35,-40 -15,-50 0,-45 
             C15,-50 35,-40 35,-20 
             C35,5 20,25 0,35 
             C-20,25 -35,5 -35,-20 Z" 
          fill="url(#brainGradient)" 
          stroke="white" 
          stroke-width="2.5"/>

    <!-- Neural Connections -->
    <circle cx="-15" cy="-15" r="4" fill="#0ea5e9"/>
    <circle cx="15" cy="-15" r="4" fill="#0ea5e9"/>
    <circle cx="0" cy="5" r="4" fill="#0ea5e9"/>
    <circle cx="-20" cy="10" r="3" fill="#38bdf8"/>
    <circle cx="20" cy="10" r="3" fill="#38bdf8"/>

    <!-- Connection Lines -->
    <line x1="-15" y1="-15" x2="0" y2="5" stroke="#0ea5e9" stroke-width="1.5" opacity="0.6"/>
    <line x1="15" y1="-15" x2="0" y2="5" stroke="#0ea5e9" stroke-width="1.5" opacity="0.6"/>
    <line x1="-15" y1="-15" x2="-20" y2="10" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>
    <line x1="15" y1="-15" x2="20" y2="10" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Chat Bubble -->
  <g transform="translate(100, 155)">
    <rect x="-45" y="-12" width="90" height="24" rx="12" fill="white" opacity="0.95"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0ea5e9">AI Business OS</text>
  </g>
</svg>